# WPPConnect Server — self-hosted WhatsApp gateway (whatsapp-web.js / Puppeteer
# under the hood). Replaces Evolution v2 which had a known instance-restart loop
# that prevented QR generation in our setup.
#
# Default port (host): 127.0.0.1:21465 — Cloudflare Tunnel proxies it to
# https://whatsapp.antagna.me.
#
# Bring up:    docker compose -f infra/whatsapp/docker-compose.yml --env-file infra/whatsapp/.env up -d
# Tear down:   docker compose -f infra/whatsapp/docker-compose.yml --env-file infra/whatsapp/.env down
# Logs:        docker compose -f infra/whatsapp/docker-compose.yml logs -f wpp
# Reset session (force new QR): docker compose down -v && docker compose up -d

services:
  wpp:
    build:
      context: .
      dockerfile: Dockerfile.wpp
      args:
        WPP_SERVER_REF: main
    image: antagna/wpp-server:latest
    container_name: wpp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:21465:21465"
    # v2.10.0 ignores --secretKey on the CLI. Our entrypoint script reads
    # WPP_SECRET_KEY + ANTAGNA_WEBHOOK_URL from env and patches the
    # baked config at startup.
    environment:
      WPP_SECRET_KEY: ${WPP_SECRET_KEY}
      ANTAGNA_WEBHOOK_URL: ${ANTAGNA_WEBHOOK_URL}
    volumes:
      # Session tokens + browser state persist across restarts → no re-pairing
      # unless the volume is wiped. Paths match WORKDIR /app in our Dockerfile.
      - wpp-tokens:/app/tokens
      - wpp-userDataDir:/app/userDataDir
      - ./wpp-config.json:/etc/wpp/config.json:ro

volumes:
  wpp-tokens:
  wpp-userDataDir:
