name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "pnpm-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: type-check (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm type-check
        run: pnpm type-check

  build-web:
    name: build (apps/web)
    runs-on: ubuntu-latest
    needs: type-check
    env:
      # Stub env vars so the Next.js build can complete; real values come from
      # the Vercel build pipeline. These are intentionally fake placeholders.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key-for-build
      SUPABASE_SERVICE_ROLE_KEY: stub-service-key-for-build
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      ANTHROPIC_API_KEY: sk-ant-stub
      OPENAI_API_KEY: sk-stub
      NEXT_PUBLIC_APP_URL: https://antagna-v2.vercel.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @antagna/web build

  migrations-sql-check:
    name: migrations look like valid SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pg_dump --version (postgres tooling available)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          pg_dump --version

      - name: every migration parses (psql --syntax-only equivalent)
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "=== $f ==="
            # pg_query_go style parser via a fresh postgres container; for now
            # we just verify ASCII + statement-terminator presence as a smoke check.
            grep -q ';' "$f" || { echo "$f has no semicolons"; exit 1; }
          done
          echo "OK — $(ls supabase/migrations/*.sql | wc -l) migrations look statement-shaped"

  unit-tests:
    name: unit tests (vitest)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @antagna/web test

  e2e:
    name: e2e (playwright, prod URL smoke)
    runs-on: ubuntu-latest
    needs: [type-check, build-web]
    # Only run when push/PR is from the same repo (secrets are unavailable
    # to fork PRs); fork PRs no-op cleanly.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      E2E_BASE_URL: https://antagna-v2.vercel.app
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_SERVICE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
      E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: install playwright browsers
        run: pnpm --filter @antagna/e2e exec playwright install --with-deps chromium
      - name: pnpm e2e
        # Skip gracefully if no E2E secrets configured for this repo yet.
        run: |
          if [ -z "$E2E_SUPABASE_SERVICE_KEY" ]; then
            echo "::warning::E2E secrets unset — skipping (set in repo Settings → Secrets to enable)"
            exit 0
          fi
          pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 7
