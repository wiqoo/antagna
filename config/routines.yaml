# Antagna — Per-Position Daily Routine (My Day checklist)
#
# Source of truth for the per-position "روتين اليوم" checklist rendered on
# /my-day. Each position lists the recurring daily actions the holder should
# tick off every working day. The app (apps/web/src/lib/routines.ts →
# loadRoutines) reads THIS file; the My Day page materializes one daily_tasks
# row per item per day (idempotently, keyed by source_key='routine:<key>:<date>')
# so progress persists and shows on /tasks too.
#
# Derived from the 16-position model (migration 049) + the JDs / capabilities in
# config/roles.yaml + the per-position dashboard boards in
# apps/web/src/app/dashboard/cards/catalog.ts (POSITION_LAYOUT).
#
# Shape per position:
#   <position_key>:
#     - key: short_stable_id        # unique within the position; used in source_key
#       title_ar: Arabic action      # what to do (UI string, Arabic primary)
#       when: morning | midday | evening | anytime   # rough time-of-day hint
#
# `key` MUST stay stable — changing it orphans already-materialized rows for the
# day. Add new items with new keys; don't rename old ones.

positions:
  general_manager:
    - { key: review_at_risk,     title_ar: راجع المشاريع المتعثّرة وحدّد تدخّلك, when: morning }
    - { key: clear_approvals,    title_ar: صفّ الموافقات المعلّقة على طاولتك,     when: morning }
    - { key: check_revenue,      title_ar: راجع إيراد الشهر والتدفّق النقدي,       when: midday }
    - { key: team_pulse,         title_ar: تابع نبض الفريق وأي اختناق بشري,        when: evening }

  creative_director:
    - { key: review_creative,    title_ar: راجع الأعمال الإبداعية المنتظرة موافقتك, when: morning }
    - { key: shoots_today,       title_ar: اطّلع على تصوير اليوم ووجّه الـ brief,   when: morning }
    - { key: stale_creative,     title_ar: تابع المحادثات الإبداعية المتوقّفة,       when: midday }
    - { key: capacity_check,     title_ar: تأكّد من توزيع حمولة المصوّرين والمحرّرين, when: midday }

  production_director:
    - { key: capacity_review,    title_ar: راجع حمولة الفريق وتوقّع الـ overload,    when: morning }
    - { key: shoots_ready,       title_ar: تأكّد جاهزية تصوير اليوم (طاقم + معدّات), when: morning }
    - { key: equipment_status,   title_ar: تابع حالة المعدّات والبطاريات والتعارضات, when: midday }
    - { key: at_risk_projects,   title_ar: تدخّل في المشاريع المعرّضة لتأخير التسليم, when: midday }
    - { key: system_health,      title_ar: تحقّق من صحّة الربط وحالة المهام الخلفية, when: evening }

  project_manager:
