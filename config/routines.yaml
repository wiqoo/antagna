    - { key: clear_approvals,    title_ar: نفّذ الموافقات المنتظرة منك,             when: morning }
    - { key: milestones_today,   title_ar: تابع milestones وتسليمات اليوم,          when: midday }
    - { key: client_responses,   title_ar: تأكّد من الرد على العملاء خلال ساعتين,    when: midday }
